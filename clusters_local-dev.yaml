apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: peer-pool-test
    app.kubernetes.io/part-of: bng-edge
  name: bng-peer-pool
  namespace: demo-peer-pool
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bng-peer
  serviceName: bng-peers
  template:
    metadata:
      annotations:
        prometheus.io/port: "9090"
        prometheus.io/scrape: "true"
      labels:
        app: bng-peer
    spec:
      containers:
      - args:
        - |
          # Get pod ordinal for node ID
          POD_NAME=$(hostname)
          NODE_NUM=$(echo $POD_NAME | grep -o '[0-9]*$')
          NODE_ID="bng-${NODE_NUM}"
          NODE_IP="10.50.${NODE_NUM}.1"

          # List of all peers
          PEERS="bng-0.bng-peers.demo-peer-pool.svc:9080,bng-1.bng-peers.demo-peer-pool.svc:9080,bng-2.bng-peers.demo-peer-pool.svc:9080"

          exec /app/bng run \
            --interface=veth-bng \
            --pool-network=10.50.0.0/16 \
            --pool-gateway=${NODE_IP} \
            --pool-dns=8.8.8.8 \
            --node-id=${NODE_ID} \
            --peers=${PEERS} \
            --peer-listen=:9080 \
            --lease-time=5m \
            --log-level=debug
        command:
        - /bin/sh
        - -c
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        image: ghcr.io/codelaboratoryltd/bng:latest
        name: bng-peer-pool
        ports:
        - containerPort: 8080
          name: api
        - containerPort: 9080
          name: peer
        - containerPort: 9090
          name: metrics
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
            - SYS_ADMIN
          privileged: true
      - command:
        - sleep
        - infinity
        image: alpine:3.19
        name: client
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
          privileged: true
        volumeMounts:
        - mountPath: /scripts
          name: scripts
          readOnly: true
      initContainers:
      - args:
        - |
          # Create veth pair for local clients
          ip link add veth-bng type veth peer name veth-client

          # Assign IP based on pod ordinal
          POD_NAME=$(hostname)
          NODE_NUM=$(echo $POD_NAME | grep -o '[0-9]*$')

          # Each node gets a /24 segment: bng-0=10.50.0.x, bng-1=10.50.1.x, etc.
          NODE_IP="10.50.${NODE_NUM}.1"

          ip addr add ${NODE_IP}/24 dev veth-bng
          ip link set veth-bng up
          ip link set veth-client up

          echo "Network ready: veth-bng (${NODE_IP}) <-> veth-client"
        command:
        - /bin/sh
        - -c
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        image: nicolaka/netshoot:latest
        name: network-setup
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
          privileged: true
      shareProcessNamespace: true
      volumes:
      - configMap:
          defaultMode: 493
          name: peer-pool-scripts
        name: scripts
---
