apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: rendezvous-server
    demo: p2p
  name: p2p-rendezvous-server
  namespace: demo-p2p
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rendezvous-server
  serviceName: p2p-rendezvous-server
  template:
    metadata:
      labels:
        app: rendezvous-server
    spec:
      containers:
      - args:
        - rendezvous
        - --port=8765
        - --data-path=/data
        image: ghcr.io/codelaboratoryltd/nexus:latest
        livenessProbe:
          initialDelaySeconds: 10
          periodSeconds: 30
          tcpSocket:
            port: 8765
        name: rendezvous
        ports:
        - containerPort: 8765
          name: p2p
          protocol: TCP
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - mountPath: /data
          name: data
      initContainers:
      - command:
        - sh
        - -c
        - |
          # Get peer ID (generates key if not exists)
          PEER_ID=$(nexus peer-id --data-path=/data)
          echo "Rendezvous server peer ID: ${PEER_ID}"

          # Construct the full multiaddr
          # Use DNS name for service discovery within the cluster
          SERVICE_NAME="${HOSTNAME%-*}"  # Remove pod ordinal suffix
          NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
          MULTIADDR="/dns4/${SERVICE_NAME}.${NAMESPACE}.svc.cluster.local/tcp/8765/p2p/${PEER_ID}"

          echo "Publishing multiaddr: ${MULTIADDR}"

          # Update ConfigMap using kubectl
          cat > /tmp/patch.json << EOF
          {"data": {"RENDEZVOUS_MULTIADDR": "${MULTIADDR}"}}
          EOF

          # Use the kubernetes API to patch the configmap
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          APISERVER=https://kubernetes.default.svc

          curl -s --cacert ${CACERT} \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/strategic-merge-patch+json" \
            -X PATCH \
            "${APISERVER}/api/v1/namespaces/${NAMESPACE}/configmaps/rendezvous-config" \
            -d @/tmp/patch.json

          echo "ConfigMap updated successfully"
        image: ghcr.io/codelaboratoryltd/nexus:latest
        name: publish-peer-id
        volumeMounts:
        - mountPath: /data
          name: data
      serviceAccountName: p2p-rendezvous-server
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 100Mi
