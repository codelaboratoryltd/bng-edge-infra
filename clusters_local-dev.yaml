    app.kubernetes.io/component: blaster-test
    app.kubernetes.io/part-of: bng-edge
  name: bng-dhcp-test
  namespace: demo-blaster-test
spec:
  containers:
  - args:
    - run
    - --interface=veth-bng
    - --pool-network=10.100.0.0/24
    - --pool-gateway=10.100.0.1
    - --pool-dns=8.8.8.8
    - --lease-time=1h
    image: ghcr.io/codelaboratoryltd/bng:latest
    name: bng
    securityContext:
      capabilities:
        add:
        - NET_ADMIN
        - NET_RAW
        - SYS_ADMIN
      privileged: true
  - command:
    - sleep
    - infinity
    image: alpine:3.19
    name: client
    securityContext:
      capabilities:
        add:
        - NET_ADMIN
        - NET_RAW
      privileged: true
    volumeMounts:
    - mountPath: /scripts
      name: scripts
      readOnly: true
  initContainers:
  - args:
    - |
      apk add --no-cache iproute2

      # Create veth pair (direct L2 connection for DHCP)
      ip link add veth-bng type veth peer name veth-client
      ip addr add 10.100.0.1/24 dev veth-bng
      ip link set veth-bng up
      ip link set veth-client up

      echo "Network setup complete - direct veth pair"
      ip link show veth-bng
      ip link show veth-client
    command:
    - /bin/sh
    - -c
    image: alpine:3.19
    name: network-setup
    securityContext:
      capabilities:
        add:
        - NET_ADMIN
        - NET_RAW
      privileged: true
  shareProcessNamespace: true
  volumes:
  - configMap:
      defaultMode: 493
      name: test-scripts
