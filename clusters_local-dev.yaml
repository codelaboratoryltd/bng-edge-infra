apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: bgp-test
    app.kubernetes.io/part-of: bng-edge
  name: bng-bgp
  namespace: demo-bgp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bng-bgp
      app.kubernetes.io/part-of: bgp-demo
  serviceName: bgp-peers
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "9090"
        prometheus.io/scrape: "true"
      labels:
        app: bng-bgp
        app.kubernetes.io/part-of: bgp-demo
    spec:
      containers:
      - command:
        - /bin/sh
        - /config/startup.sh
        image: quay.io/frrouting/frr:10.5.1
        name: frr
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
            - SYS_ADMIN
          privileged: true
        volumeMounts:
        - mountPath: /config
          name: frr-config
          readOnly: true
        - mountPath: /scripts
          name: test-scripts
          readOnly: true
        - mountPath: /var/run/frr
          name: frr-run
      - args:
        - |
          echo "BNG BGP Demo Container"
          echo "======================"
          echo ""
          echo "This container simulates the BNG application."
          echo "In production, the BNG would use the routing package to:"
          echo "  1. Inject /32 routes when subscribers connect"
          echo "  2. Withdraw routes when subscribers disconnect"
          echo ""
          echo "The FRR sidecar handles actual BGP protocol."
          echo ""
          echo "Use /scripts/ for demo commands:"
          echo "  /scripts/run-demo.sh           - Run full demo"
          echo "  /scripts/inject-subscriber-route.sh 10.0.1.1"
          echo "  /scripts/withdraw-subscriber-route.sh 10.0.1.1"
          echo "  /scripts/check-bgp-session.sh"
          echo "  /scripts/show-routes.sh"
          echo ""
          sleep infinity
        command:
        - /bin/sh
        - -c
        env:
        - name: VTYSH_PAGER
          value: cat
        image: alpine:3.19
        name: bng
        volumeMounts:
        - mountPath: /scripts
          name: test-scripts
          readOnly: true
        - mountPath: /var/run/frr
          name: frr-run
      volumes:
      - configMap:
          defaultMode: 493
          name: frr-bng-config
        name: frr-config
      - configMap:
          defaultMode: 493
          name: bgp-test-scripts
        name: test-scripts
      - emptyDir: {}
        name: frr-run
