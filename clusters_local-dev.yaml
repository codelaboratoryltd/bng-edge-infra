apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: nexus
    app.kubernetes.io/component: nexus-p2p
    app.kubernetes.io/name: nexus
    demo: p2p
  name: p2p-nexus
  namespace: demo-p2p
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nexus
  serviceName: p2p-nexus
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "9002"
        prometheus.io/scrape: "true"
      labels:
        app: nexus
    spec:
      containers:
      - args:
        - serve
        - --http-port=9000
        - --metrics-port=9002
        - --p2p-port=33123
        - --p2p=true
        - --role=core
        - --data-path=/data
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NEXUS_RENDEZVOUS_SERVER
          valueFrom:
            configMapKeyRef:
              key: RENDEZVOUS_MULTIADDR
              name: p2p-rendezvous-config
        - name: NEXUS_RENDEZVOUS_NAMESPACE
          value: nexus
        - name: NEXUS_DISCOVERY
          value: mdns
        image: ghcr.io/codelaboratoryltd/nexus:latest
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 10
        name: nexus
        ports:
        - containerPort: 9000
          name: http
          protocol: TCP
        - containerPort: 9002
          name: metrics
          protocol: TCP
        - containerPort: 33123
          name: p2p
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /ready
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /data
          name: data
      initContainers:
      - command:
        - sh
        - -c
        - |
          echo "Waiting for rendezvous server ConfigMap to be populated..."
          while true; do
            # Read the ConfigMap value
            MULTIADDR=$(cat /config/RENDEZVOUS_MULTIADDR 2>/dev/null || echo "")
            if [ -n "$MULTIADDR" ] && [ "$MULTIADDR" != "" ]; then
              echo "Rendezvous multiaddr found: $MULTIADDR"
              break
            fi
            echo "ConfigMap not yet populated, waiting..."
            sleep 5
          done
        image: busybox:1.36
        name: wait-for-rendezvous
        volumeMounts:
        - mountPath: /config
          name: rendezvous-config
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      serviceAccountName: p2p-nexus
      volumes:
      - configMap:
          name: p2p-rendezvous-config
        name: rendezvous-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 100Mi
