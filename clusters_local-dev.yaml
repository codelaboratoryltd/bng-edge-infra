apiVersion: v1
data:
  dashboardproviders.yaml: |
    apiVersion: 1
    providers:
    - disableDeletion: false
      editable: true
      folder: ""
      name: default
      options:
        path: /var/lib/grafana/dashboards/default
      orgId: 1
      type: file
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - access: proxy
      isDefault: true
      name: Prometheus
      type: prometheus
      url: http://prometheus-server.monitoring.svc.cluster.local
  download_dashboards.sh: "#!/usr/bin/env sh\nset -euf\nmkdir -p /var/lib/grafana/dashboards/default\n\ncurl
    -skf \\\n--connect-timeout 60 \\\n--max-time 60 \\\n-H \"Accept: application/json\"
    \\\n-H \"Content-Type: application/json;charset=UTF-8\" \\\n  \"https://grafana.com/api/dashboards/16612/revisions/1/download\"
    \\\n  | sed '/-- .* --/! s/\"datasource\":.*,/\"datasource\": \"Prometheus\",/g'
    \\\n> \"/var/lib/grafana/dashboards/default/cilium-agent.json\"\n  \ncurl -skf
    \\\n--connect-timeout 60 \\\n--max-time 60 \\\n-H \"Accept: application/json\"
    \\\n-H \"Content-Type: application/json;charset=UTF-8\" \\\n  \"https://grafana.com/api/dashboards/16611/revisions/1/download\"
    \\\n  | sed '/-- .* --/! s/\"datasource\":.*,/\"datasource\": \"Prometheus\",/g'
    \\\n> \"/var/lib/grafana/dashboards/default/cilium-operator.json\"\n  \ncurl -skf
    \\\n--connect-timeout 60 \\\n--max-time 60 \\\n-H \"Accept: application/json\"
    \\\n-H \"Content-Type: application/json;charset=UTF-8\" \\\n  \"https://grafana.com/api/dashboards/16613/revisions/1/download\"
    \\\n  | sed '/-- .* --/! s/\"datasource\":.*,/\"datasource\": \"Prometheus\",/g'
    \\\n> \"/var/lib/grafana/dashboards/default/hubble.json\"\n"
