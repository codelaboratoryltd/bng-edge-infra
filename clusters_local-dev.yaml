apiVersion: v1
kind: Pod
metadata:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "9090"
    prometheus.io/scrape: "true"
  labels:
    app: bng-e2e
  name: bng-e2e
  namespace: demo-e2e
spec:
  containers:
  - args:
    - run
    - --interface=veth-bng
    - --nexus-url=http://nexus:9000
    - --nexus-pool=e2e-pool
    - --pool-network=10.200.0.0/16
    - --pool-gateway=10.200.0.1
    - --pool-dns=8.8.8.8
    - --lease-time=1h
    env:
    - name: NEXUS_URL
      value: http://nexus:9000
    image: ghcr.io/codelaboratoryltd/bng:latest
    name: bng
    securityContext:
      capabilities:
        add:
        - NET_ADMIN
        - NET_RAW
        - SYS_ADMIN
      privileged: true
  - command:
    - sleep
    - infinity
    image: alpine:3.19
    name: client
    securityContext:
      capabilities:
        add:
        - NET_ADMIN
        - NET_RAW
      privileged: true
    volumeMounts:
    - mountPath: /scripts
      name: scripts
      readOnly: true
  initContainers:
  - args:
    - |
      echo "Waiting for Nexus..."
      until curl -sf "http://nexus:9000/api/v1/pools" > /dev/null 2>&1; do
        echo "  Nexus not ready, waiting..."
        sleep 2
      done
      echo "Nexus is ready!"

      echo "Creating e2e-pool (10.200.0.0/16)..."
      curl -sf -X POST "http://nexus:9000/api/v1/pools" \
        -H "Content-Type: application/json" \
        -d '{"id":"e2e-pool","cidr":"10.200.0.0/16","prefix":32}' 2>&1 || echo "Pool may already exist"

      echo "Verifying pool:"
      curl -sf "http://nexus:9000/api/v1/pools"
    command:
    - /bin/sh
    - -c
    image: curlimages/curl:latest
    name: setup-nexus
  - args:
    - |
      # Create veth pair for L2 connectivity
      ip link add veth-bng type veth peer name veth-client
      ip addr add 10.200.0.1/16 dev veth-bng
      ip link set veth-bng up
      ip link set veth-client up

      echo "L2 network ready:"
      echo "  veth-bng:    10.200.0.1/16 (BNG DHCP server)"
      echo "  veth-client: (will get IP via DHCP from Nexus pool)"
    command:
    - /bin/sh
    - -c
    image: nicolaka/netshoot:latest
    name: network-setup
    securityContext:
      capabilities:
        add:
        - NET_ADMIN
        - NET_RAW
      privileged: true
  shareProcessNamespace: true
  volumes:
  - configMap:
      defaultMode: 493
      name: e2e-scripts
    name: scripts
