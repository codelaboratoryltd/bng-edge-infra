kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: "1"
  name: grafana-dashboards-bng-4m44622g94
  namespace: monitoring
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app: prometheus
    role: alert-rules
  name: bng-edge-alerts
  namespace: monitoring
spec:
  groups:
  - interval: 30s
    name: bng.rules
    rules:
    - alert: BNGDown
      annotations:
        description: BNG instance {{ $labels.instance }} has been unreachable for
          more than 1 minute.
        runbook_url: https://docs.example.com/runbooks/bng-down
        summary: BNG instance {{ $labels.instance }} is down
      expr: up{job="bng"} == 0
      for: 1m
      labels:
        severity: critical
    - alert: BNGHighCPU
      annotations:
        description: 'BNG instance {{ $labels.instance }} CPU usage has been above
          80% for 5 minutes. Current: {{ $value | printf "%.1f" }}%'
        summary: BNG {{ $labels.instance }} CPU usage is high
      expr: rate(process_cpu_seconds_total{job="bng"}[5m]) * 100 > 80
      for: 5m
      labels:
        severity: warning
    - alert: BNGHighMemory
      annotations:
        description: 'BNG instance {{ $labels.instance }} is using more than 4GB of
          memory. Current: {{ $value | printf "%.2f" }}GB'
        summary: BNG {{ $labels.instance }} memory usage is high
      expr: (process_resident_memory_bytes{job="bng"} / 1024 / 1024 / 1024) > 4
      for: 5m
      labels:
        severity: warning
    - alert: DHCPHighLatency
      annotations:
        description: 'DHCP P99 latency on {{ $labels.instance }} is above 10ms (slow
          path threshold). Current: {{ $value | printf "%.3f" }}s'
        summary: DHCP P99 latency is high on {{ $labels.instance }}
      expr: histogram_quantile(0.99, rate(dhcp_request_duration_seconds_bucket{job="bng"}[5m]))
        > 0.01
      for: 5m
      labels:
        severity: warning
    - alert: DHCPFastPathLatencyHigh
      annotations:
        description: 'DHCP fast path P99 latency on {{ $labels.instance }} is above
          100us. Current: {{ $value | printf "%.6f" }}s'
        summary: DHCP fast path P99 latency is high on {{ $labels.instance }}
      expr: histogram_quantile(0.99, rate(dhcp_fast_path_duration_seconds_bucket{job="bng"}[5m]))
        > 0.0001
      for: 5m
      labels:
        severity: warning
    - alert: DHCPCacheHitRateLow
      annotations:
        description: 'DHCP cache hit rate on {{ $labels.instance }} is below 95%.
          Current: {{ $value | printf "%.1f" }}%'
        summary: DHCP cache hit rate is low on {{ $labels.instance }}
      expr: rate(dhcp_cache_hits_total{job="bng"}[5m]) / (rate(dhcp_cache_hits_total{job="bng"}[5m])
        + rate(dhcp_cache_misses_total{job="bng"}[5m])) < 0.95
      for: 10m
      labels:
        severity: warning
    - alert: DHCPErrorRateHigh
      annotations:
        description: 'DHCP error rate on {{ $labels.instance }} is above 1%. Current:
          {{ $value | printf "%.2f" }}%'
        summary: DHCP error rate is high on {{ $labels.instance }}
      expr: rate(dhcp_errors_total{job="bng"}[5m]) / rate(dhcp_requests_total{job="bng"}[5m])
        > 0.01
      for: 5m
      labels:
        severity: warning
    - alert: IPPoolExhausted
      annotations:
        description: 'IP pool {{ $labels.pool }} has fewer than 100 available addresses.
          Current: {{ $value }}'
        summary: IP pool {{ $labels.pool }} is nearly exhausted
      expr: ip_pool_available_addresses{job="bng"} < 100
      for: 5m
      labels:
        severity: critical
    - alert: IPPoolUtilizationHigh
      annotations:
        description: 'IP pool {{ $labels.pool }} utilization is above 90%. Current:
          {{ $value | printf "%.1f" }}%'
        summary: IP pool {{ $labels.pool }} utilization is high
      expr: (ip_pool_allocated_addresses{job="bng"} / ip_pool_total_addresses{job="bng"})
        > 0.9
      for: 10m
      labels:
        severity: warning
    - alert: SubscriberSessionsHigh
      annotations:
        description: 'BNG instance {{ $labels.instance }} has more than 1800 active
          subscribers (approaching 2000 limit). Current: {{ $value }}'
        summary: High subscriber count on {{ $labels.instance }}
      expr: bng_active_sessions{job="bng"} > 1800
      for: 5m
      labels:
        severity: warning
    - alert: SessionCreationRateHigh
      annotations:
        description: 'Session creation rate on {{ $labels.instance }} is above 100/s.
          This may indicate a network event. Current: {{ $value | printf "%.1f" }}/s'
        summary: High session creation rate on {{ $labels.instance }}
      expr: rate(bng_sessions_created_total{job="bng"}[5m]) > 100
      for: 5m
      labels:
        severity: warning
  - interval: 30s
    name: nexus.rules
    rules:
    - alert: NexusDown
      annotations:
        description: Nexus instance {{ $labels.instance }} has been unreachable for
          more than 1 minute.
        summary: Nexus instance {{ $labels.instance }} is down
      expr: up{job="nexus"} == 0
      for: 1m
      labels:
        severity: critical
    - alert: NexusClusterUnhealthy
      annotations:
        description: 'Nexus cluster has fewer than 2 healthy nodes. Current: {{ $value
          }}'
        summary: Nexus cluster has insufficient healthy nodes
      expr: nexus_cluster_healthy_nodes{job="nexus"} < 2
      for: 2m
      labels:
        severity: critical
    - alert: NexusHashringRebalancing
      annotations:
        description: Nexus hashring on {{ $labels.instance }} has been rebalancing
          for more than 10 minutes.
        summary: Nexus hashring rebalancing for over 10 minutes
      expr: nexus_hashring_rebalancing{job="nexus"} == 1
      for: 10m
      labels:
        severity: warning
    - alert: NexusAllocationLatencyHigh
      annotations:
        description: 'Nexus allocation P99 latency is above 100ms. Current: {{ $value
          | printf "%.3f" }}s'
        summary: Nexus allocation latency is high
      expr: histogram_quantile(0.99, rate(nexus_allocation_duration_seconds_bucket{job="nexus"}[5m]))
        > 0.1
      for: 5m
      labels:
        severity: warning
  - interval: 30s
    name: ha.rules
    rules:
    - alert: HAPeerDisconnected
      annotations:
        description: BNG instance {{ $labels.instance }} has lost connection to its
          HA peer.
        summary: HA peer disconnected on {{ $labels.instance }}
      expr: bng_ha_peer_connected{job="bng"} == 0
      for: 1m
      labels:
        severity: critical
    - alert: HASyncLagHigh
      annotations:
        description: 'HA sync lag on {{ $labels.instance }} is above 5 seconds. Current:
          {{ $value | printf "%.1f" }}s'
        summary: HA sync lag is high on {{ $labels.instance }}
      expr: bng_ha_sync_lag_seconds{job="bng"} > 5
      for: 2m
      labels:
        severity: warning
    - alert: HAFailoverOccurred
      annotations:
        description: A HA failover event was detected on {{ $labels.instance }}.
        summary: HA failover occurred on {{ $labels.instance }}
      expr: increase(bng_ha_failovers_total{job="bng"}[5m]) > 0
      labels:
        severity: warning
  - interval: 30s
    name: network.rules
    rules:
    - alert: HighPacketDropRate
      annotations:
        description: 'Packet drop rate on {{ $labels.instance }} is above 0.1%. Current:
          {{ $value | printf "%.3f" }}%'
        summary: High packet drop rate on {{ $labels.instance }}
      expr: rate(bng_packets_dropped_total{job="bng"}[5m]) / rate(bng_packets_total{job="bng"}[5m])
        > 0.001
      for: 5m
      labels:
        severity: warning
    - alert: HighXDPDropRate
      annotations:
        description: 'XDP drop rate on {{ $labels.instance }} is above 1000/s. Current:
          {{ $value | printf "%.1f" }}/s'
        summary: High XDP drop rate on {{ $labels.instance }}
      expr: rate(xdp_drop_total{job="bng"}[5m]) > 1000
      for: 5m
      labels:
        severity: warning
    - alert: EBPFMapNearCapacity
      annotations:
        description: 'eBPF map {{ $labels.map }} on {{ $labels.instance }} is above
          90% capacity. Current: {{ $value | printf "%.1f" }}%'
        summary: eBPF map {{ $labels.map }} near capacity
      expr: (ebpf_map_entries{job="bng"} / ebpf_map_max_entries{job="bng"}) > 0.9
      for: 5m
      labels:
        severity: warning
  - interval: 30s
    name: radius.rules
    rules:
    - alert: RADIUSServerUnreachable
      annotations:
        description: RADIUS server {{ $labels.server }} has been unreachable from
          {{ $labels.instance }} for more than 1 minute.
        summary: RADIUS server {{ $labels.server }} is unreachable
      expr: radius_server_up{job="bng"} == 0
      for: 1m
      labels:
        severity: critical
    - alert: RADIUSHighLatency
      annotations:
        description: 'RADIUS P99 latency is above 1s. Current: {{ $value | printf
          "%.2f" }}s'
        summary: RADIUS P99 latency is high
      expr: histogram_quantile(0.99, rate(radius_request_duration_seconds_bucket{job="bng"}[5m]))
        > 1
      for: 5m
      labels:
        severity: warning
    - alert: RADIUSHighRejectRate
      annotations:
        description: 'RADIUS reject rate is above 10%. Current: {{ $value | printf
          "%.1f" }}%'
        summary: RADIUS reject rate is high
      expr: rate(radius_rejects_total{job="bng"}[5m]) / rate(radius_requests_total{job="bng"}[5m])
        > 0.1
      for: 10m
      labels:
        severity: warning
